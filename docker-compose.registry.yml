      - "3010:3010"
    depends_on:
      - identity-service
      - patient-service
      - appointment-service
      - doctor-service
      - billing-service
      - ehr-service
      - procedure-service
      - procurement-service
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  # Remove this block if you handle TLS at the load balancer / cloud level.

  nginx:
    <<: *service-defaults
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web-portal
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

# ─── NETWORKS & VOLUMES ───────────────────────────────────────────────────────

networks:
  fadl-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
