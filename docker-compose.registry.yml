# ─── Fadl Clinic — Registry Deployment (Docker Hub) ──────────────────────────
# Standalone compose file — pulls pre-built images, no source code required.
#
# WHAT YOU NEED ON THE SERVER:
#   docker-compose.registry.yml   (this file)
#   infra/postgres/init.sql
#   infra/postgres/pg_hba.conf
#   infra/pgbouncer/pgbouncer.ini
#   infra/pgbouncer/userlist.txt
#   infra/nginx/nginx.conf        (if using nginx)
#   .env                          (copy .env.prod.example → .env, fill in secrets)
#
# QUICK START:
#   docker login
#   docker compose -f docker-compose.registry.yml pull
#   docker compose -f docker-compose.registry.yml up -d
#
# UPDATE TO A NEW RELEASE:
#   docker compose -f docker-compose.registry.yml pull
#   docker compose -f docker-compose.registry.yml up -d
# ──────────────────────────────────────────────────────────────────────────────

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - fadl-net
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf -c password_encryption=md5
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       postgres
      PGPASSWORD:        ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  minio:
    <<: *service-defaults
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:             ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD:         ${MINIO_SECRET_KEY}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGIN:-*}
    volumes:
      - miniodata:/data
    ports:
      - "9001:9001"       # MinIO console (admin UI) — firewall-protect this
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  pgbouncer:
    <<: *service-defaults
    image: pgbouncer/pgbouncer:latest
    entrypoint: ["/opt/pgbouncer/pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z -w 3 127.0.0.1 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Microservices ───────────────────────────────────────────────────────────

  identity-service:
    <<: *service-defaults
    image: saadelkenawy/fcms-identity-service:post-prod
    environment:
      NODE_ENV:          production
      PORT:              3000
      JWT_SECRET:        ${JWT_SECRET}
      JWT_EXPIRY:        ${JWT_EXPIRY:-15m}
      DATABASE_URL:      postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/fadl_identity
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL:         warn
      BRANCH_ID:         ${BRANCH_ID:-1}
      SERVICE_NAME:      identity-service
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  patient-service:
    <<: *service-defaults
    image: saadelkenawy/fcms-patient-service:post-prod
    environment:
      NODE_ENV:          production
      PORT:              3002
      JWT_SECRET:        ${JWT_SECRET}
      JWT_EXPIRY:        ${JWT_EXPIRY:-15m}
      DATABASE_URL:      postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/fadl_patients
