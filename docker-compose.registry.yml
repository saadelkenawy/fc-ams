      DATABASE_POOL_MAX:   10
      LOG_LEVEL:           warn
      BRANCH_ID:           ${BRANCH_ID:-1}
      SERVICE_NAME:        notification-service
      SMTP_HOST:           ${SMTP_HOST:-}
      SMTP_PORT:           ${SMTP_PORT:-587}
      SMTP_USER:           ${SMTP_USER:-}
      SMTP_PASS:           ${SMTP_PASS:-}
      SMTP_FROM:           ${SMTP_FROM:-Fadl Clinic <noreply@fadlclinic.com>}
      TWILIO_ACCOUNT_SID:  ${TWILIO_ACCOUNT_SID:-}
