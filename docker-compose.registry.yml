        limits:
          memory: 256m
          cpus: "0.5"

  appointment-service:
    <<: *service-defaults
    image: saadelkenawy/fcms-appointment-service:post-prod
    environment:
      NODE_ENV:                  production
      PORT:                      3001
      JWT_SECRET:                ${JWT_SECRET}
      JWT_EXPIRY:                ${JWT_EXPIRY:-15m}
      DATABASE_URL:              postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/fadl_appointments
      REDIS_URL:                 redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_POOL_MIN:         2
      DATABASE_POOL_MAX:         10
      LOG_LEVEL:                 warn
      BRANCH_ID:                 ${BRANCH_ID:-1}
      SERVICE_NAME:              appointment-service
      NOTIFICATION_SERVICE_URL:  http://notification-service:3007/api/v1
      BILLING_SERVICE_URL:       http://billing-service:3004/api/v1
      IDENTITY_SERVICE_URL:      http://identity-service:3000/api/v1
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
