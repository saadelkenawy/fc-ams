      JWT_SECRET:        ${JWT_SECRET}
      JWT_EXPIRY:        ${JWT_EXPIRY:-15m}
      DATABASE_URL:      postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/fadl_procedures
      DATABASE_POOL_MIN: 2
