      APPOINTMENT_SERVICE_URL:   http://appointment-service:3001/api/v1
      PATIENT_SERVICE_URL:       http://patient-service:3002/api/v1
      DOCTOR_SERVICE_URL:        http://doctor-service:3003/api/v1
