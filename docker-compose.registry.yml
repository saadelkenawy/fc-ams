  file-service:
    <<: *service-defaults
    image: saadelkenawy/fcms-file-service:post-prod
    environment:
      NODE_ENV:          production
      PORT:              3011
      JWT_SECRET:        ${JWT_SECRET}
      JWT_EXPIRY:        ${JWT_EXPIRY:-15m}
      DATABASE_URL:      postgresql://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/fadl_files
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL:         warn
      BRANCH_ID:         ${BRANCH_ID:-1}
      SERVICE_NAME:      file-service
      MINIO_ENDPOINT:    minio
      MINIO_PORT:        9000
      MINIO_ACCESS_KEY:  ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY:  ${MINIO_SECRET_KEY}
      MINIO_BUCKET:      fadl-files
      MINIO_USE_SSL:     "false"
      MINIO_PUBLIC_URL:  ${MINIO_PUBLIC_URL}
    depends_on:
