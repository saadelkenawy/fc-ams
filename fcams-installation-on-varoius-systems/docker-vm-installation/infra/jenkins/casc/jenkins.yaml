# ─── Jenkins Configuration as Code (JCasC) ────────────────────────────────────
# Core settings only. Credentials are configured via the UI or by re-running
# setup.sh with a valid .env file (which passes GITHUB_TOKEN, DOCKERHUB_TOKEN, etc.).
# ──────────────────────────────────────────────────────────────────────────────

jenkins:
  systemMessage: "Fadl Clinic FCMS — CI/CD Pipeline"
  numExecutors: 4
  mode: NORMAL
  scmCheckoutRetryCount: 2

  # Allow full access without login until admin user is configured via UI
  authorizationStrategy:
    unsecured: {}

  securityRealm:
    none: {}

unclassified:
  location:
    url: "http://192.168.110.100:8080/"
