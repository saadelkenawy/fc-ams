# PgBouncer — Fadl Clinic connection pooler
# Pool mode: session (safe for SET app.current_branch_id RLS context vars)
# Each service has its own database; pools are per-database so services
# never contend with each other.

[databases]
fadl_identity     = host=postgres port=5432 dbname=fadl_identity
fadl_patients     = host=postgres port=5432 dbname=fadl_patients
fadl_appointments = host=postgres port=5432 dbname=fadl_appointments
fadl_doctors      = host=postgres port=5432 dbname=fadl_doctors
fadl_billing      = host=postgres port=5432 dbname=fadl_billing
fadl_notifications = host=postgres port=5432 dbname=fadl_notifications
fadl_chatbot      = host=postgres port=5432 dbname=fadl_chatbot
fadl_files        = host=postgres port=5432 dbname=fadl_files
fadl_ehr          = host=postgres port=5432 dbname=fadl_ehr
fadl_procedures   = host=postgres port=5432 dbname=fadl_procedures
fadl_procurement  = host=postgres port=5432 dbname=fadl_procurement
fadl_integrations = host=postgres port=5432 dbname=fadl_integrations

[pgbouncer]
listen_addr       = 0.0.0.0
listen_port       = 5432

# Auth: md5 for clients; backend uses scram-sha-256 (postgres:16 default).
# PgBouncer 1.18+ derives the SCRAM handshake from the plaintext in userlist.txt.
auth_type         = md5
auth_file         = /etc/pgbouncer/userlist.txt

# Session pooling: one server connection per client session.
# Required here because services use SET app.current_branch_id (session var)
# for Row Level Security. Transaction pooling would break RLS isolation.
pool_mode         = session

# Per-database pool sizing — set above DATABASE_POOL_MAX (10) per service.
# Each service owns a distinct database so pools are fully isolated.
default_pool_size = 15
min_pool_size     = 2
reserve_pool_size = 5
reserve_pool_timeout = 3

# Connection limits
max_client_conn   = 300

# Server connection lifecycle
server_idle_timeout    = 600
server_lifetime        = 3600
server_connect_timeout = 15

# TLS disabled — all traffic is internal Docker network
server_tls_sslmode = disable
client_tls_sslmode = disable

# node-postgres sends extra_float_digits; ignore it to avoid startup errors
ignore_startup_parameters = extra_float_digits

# Logging (pooler errors only; connection noise off for dev)
log_connections    = 0
log_disconnections = 0
log_pooler_errors  = 1
stats_period       = 60

# Admin access (connect to the virtual "pgbouncer" database for SHOW STATS etc.)
admin_users        = fadl
stats_users        = fadl
