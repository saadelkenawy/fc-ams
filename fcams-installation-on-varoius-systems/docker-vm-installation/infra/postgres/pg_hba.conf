# PostgreSQL Host-Based Authentication
# Local socket — trust (Docker internal)
local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
# All host connections — md5 (required for PgBouncer 1.15 compatibility;
# upgrade pgbouncer image to 1.21+ to use scram-sha-256 here instead)
host    all             all             0.0.0.0/0               md5
