# ─── Fadl Clinic — Nginx Reverse Proxy ────────────────────────────────────────
# Single ingress for the entire clinic stack.
# All microservices stay internal; only port 80/443 are exposed to the internet.
#
# TLS setup (before starting nginx):
#   certbot certonly --standalone -d ${DOMAIN}
#   cp /etc/letsencrypt/live/${DOMAIN}/fullchain.pem infra/nginx/ssl/cert.pem
#   cp /etc/letsencrypt/live/${DOMAIN}/privkey.pem   infra/nginx/ssl/key.pem
# ──────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens  off;  # don't expose nginx version

    gzip  on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # Login endpoint: 5 requests/minute per IP (brute-force protection)
    limit_req_zone  $binary_remote_addr  zone=auth_login:10m  rate=5r/m;
    # General API: 120 requests/minute per IP
    limit_req_zone  $binary_remote_addr  zone=api_general:10m  rate=120r/m;

    # ── Upstream: Next.js web portal ──────────────────────────────────────────
    upstream web_portal {
        server  web-portal:3010;
        keepalive  32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen  80;
        server_name  _;

        location /.well-known/acme-challenge/ {
            root  /var/www/certbot;
        }

        location / {
            return  301  https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen  443  ssl  http2;
        server_name  _;

        ssl_certificate      /etc/nginx/ssl/cert.pem;
        ssl_certificate_key  /etc/nginx/ssl/key.pem;

        ssl_protocols        TLSv1.2  TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  off;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # ── Security headers ───────────────────────────────────────────────────
        add_header  Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;
        add_header  X-Frame-Options            "SAMEORIGIN" always;
        add_header  X-Content-Type-Options     "nosniff" always;
        add_header  Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header  Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

        # ── Auth login: strict rate limit ─────────────────────────────────────
        location = /api/auth/login {
            limit_req  zone=auth_login  burst=2  nodelay;
            limit_req_status  429;

            proxy_pass  http://web_portal;
            include     /etc/nginx/proxy_params.conf;
        }

        # ── General API ────────────────────────────────────────────────────────
        location /api/ {
            limit_req  zone=api_general  burst=20  nodelay;
            limit_req_status  429;

            proxy_pass  http://web_portal;
            include     /etc/nginx/proxy_params.conf;
        }

        # ── Static assets: long cache ──────────────────────────────────────────
        location /_next/static/ {
            proxy_pass  http://web_portal;
            include     /etc/nginx/proxy_params.conf;
            add_header  Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Everything else → Next.js ──────────────────────────────────────────
        location / {
            proxy_pass  http://web_portal;
            include     /etc/nginx/proxy_params.conf;
        }
    }
}
