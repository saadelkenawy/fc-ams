global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: fadl-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - identity-service:3000
          - appointment-service:3001
          - patient-service:3002
          - doctor-service:3003
          - billing-service:3004
          - ehr-service:3005
          - procedure-service:3006
          - notification-service:3007
          - ai-chatbot-service:3008
          - analytics-service:3009
          - file-service:3011
          - integration-service:3012
          - procurement-service:3013
