web-portal.sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts
web-portal.sonar.typescript.lcov.reportPaths=coverage/lcov.info
web-portal.sonar.exclusions=node_modules/**,.next/**,coverage/**,public/**,**/*.d.ts
# sonar-scanner 4.8 eslint-bridge rejects "bundler" moduleResolution — use a
# compat tsconfig that downgrades to node16 without touching the build tsconfig
web-portal.sonar.typescript.tsconfigPaths=tsconfig.sonar.json
