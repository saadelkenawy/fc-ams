# SonarQube multi-module project configuration
# Run from repo root: sonar-scanner -Dsonar.projectVersion=<tag>
# Server URL + token injected by Jenkins withSonarQubeEnv() — do not hardcode here.

# ── Global ────────────────────────────────────────────────────────────────────
sonar.projectKey=fcms
sonar.projectName=Fadl Clinic Management System
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8
sonar.coverage.exclusions=**/*

# ── Modules ───────────────────────────────────────────────────────────────────
sonar.modules=\
  identity-service,\
  appointment-service,\
  patient-service,\
  doctor-service,\
  billing-service,\
  ehr-service,\
  procedure-service,\
  notification-service,\
  ai-chatbot-service,\
  analytics-service,\
  procurement-service,\
  file-service,\
  integration-service,\
  telehealth-service,\
  web-portal

# ── identity-service ──────────────────────────────────────────────────────────
identity-service.sonar.projectName=Identity Service
identity-service.sonar.projectBaseDir=services/identity-service
identity-service.sonar.sources=src
identity-service.sonar.tests=src
identity-service.sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
identity-service.sonar.typescript.lcov.reportPaths=coverage/lcov.info
identity-service.sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.d.ts

