

# ─── Fadl Clinic — Local Development Stack ────────────────────────────────────
# Usage:
#   docker compose up -d postgres redis          # just infrastructure
#   docker compose up -d                         # everything
#   docker compose logs -f patient-service
#   docker compose down -v                       # teardown + wipe volumes
#
# Each service has its own PostgreSQL database (microservice isolation).
# A single Postgres instance runs all databases for local dev simplicity.

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - fadl-net

x-pg-env: &pg-env
  POSTGRES_USER: fadl
  POSTGRES_PASSWORD: fadl_dev_secret
  PGPASSWORD: fadl_dev_secret

# §2.1.4 asymmetric JWT — dev keypair lives in infra/jwt/ (see its README).
# identity-service signs RS256 with the private key; everyone else only verifies.
# SERVICE_JWT_SECRET signs service-to-service tokens and cannot forge user tokens.
x-jwt-env: &jwt-env
  JWT_PUBLIC_KEY_B64: 
  SERVICE_JWT_SECRET: fadl_service_token_secret_min_32_chars_dev
  JWT_EXPIRY: 15m

# ─── SERVICES ─────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf -c password_encryption=md5
    environment:
      <<: *pg-env
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fadl"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    <<: *service-defaults
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fadl_minio
      MINIO_ROOT_PASSWORD: fadl_minio_secret
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  pgbouncer:
    <<: *service-defaults
    image: pgbouncer/pgbouncer:latest
    entrypoint: ["/opt/pgbouncer/pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "5433:5432"   # host:5433 → pgbouncer (postgres stays on 5432)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z -w 3 127.0.0.1 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Nightly pg_dump of all 12 databases into the pgbackups volume.
  # Restore: bash infra/backup/restore.sh <db> <YYYY-MM-DD>
  db-backup:
    <<: *service-defaults
    image: postgres:16-alpine
    entrypoint: ["/bin/sh", "/opt/backup/run-daily.sh"]
    environment:
      PGHOST: postgres
      PGUSER: fadl
      PGPASSWORD: fadl_dev_secret
      BACKUP_RETENTION_DAYS: 14
    volumes:
      - ./infra/backup:/opt/backup:ro
      - pgbackups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  # ── Microservices ───────────────────────────────────────────────────────────

  identity-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: identity-service
    environment:
      <<: *jwt-env
      # Only identity holds the signing key (dev key — see infra/jwt/README.md)
      JWT_PRIVATE_KEY_B64: 
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_identity
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: identity-service
    ports:
      # host 3100 → container 3000 (host port 3000 is held by an unrelated
      # local process; inter-service traffic uses the Docker network anyway)
      - "3100:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  patient-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: patient-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_patients
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: patient-service
    ports:
      - "3002:3002"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  appointment-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: appointment-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_appointments
      REDIS_URL: redis://redis:6379
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: appointment-service
      NOTIFICATION_SERVICE_URL: http://notification-service:3007/api/v1
      BILLING_SERVICE_URL: http://billing-service:3004/api/v1
      IDENTITY_SERVICE_URL: http://identity-service:3000/api/v1
    ports:
      - "3001:3001"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  doctor-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: doctor-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_doctors
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: doctor-service
    ports:
      - "3003:3003"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  billing-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: billing-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_billing
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: billing-service
      APPOINTMENT_SERVICE_URL: http://appointment-service:3001/api/v1
      IDENTITY_SERVICE_URL: http://identity-service:3000
    ports:
      - "3004:3004"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  notification-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: notification-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3007
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_notifications
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: notification-service
      SMTP_HOST:     ${SMTP_HOST:-}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASS:     ${SMTP_PASS:-}
      SMTP_FROM:     ${SMTP_FROM:-Fadl Clinic <noreply@fadlclinic.com>}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:  ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    ports:
      - "3007:3007"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3007/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ai-chatbot-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: ai-chatbot-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3008
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_chatbot
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: ai-chatbot-service
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: claude-haiku-4-5-20251001
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: openai/gpt-4o-mini
      PATIENT_SERVICE_URL: http://patient-service:3002/api/v1
      DOCTOR_SERVICE_URL: http://doctor-service:3003/api/v1
      APPOINTMENT_SERVICE_URL: http://appointment-service:3001/api/v1
    ports:
      - "3008:3008"
    depends_on:
      pgbouncer:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3008/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  file-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: file-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3011
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_files
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: file-service
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: fadl_minio
      MINIO_SECRET_KEY: fadl_minio_secret
      MINIO_BUCKET: fadl-files
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: http://localhost:9000
    ports:
      - "3011:3011"
    depends_on:
      pgbouncer:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3011/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  analytics-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: analytics-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3009
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: analytics-service
      BILLING_SERVICE_URL:     http://billing-service:3004/api/v1
      APPOINTMENT_SERVICE_URL: http://appointment-service:3001/api/v1
      PATIENT_SERVICE_URL:     http://patient-service:3002/api/v1
      DOCTOR_SERVICE_URL:      http://doctor-service:3003/api/v1
    ports:
      - "3009:3009"
    depends_on:
      - billing-service
      - appointment-service
      - patient-service
      - doctor-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3009/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ehr-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: ehr-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_ehr
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: ehr-service
    ports:
      - "3005:3005"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  procedure-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: procedure-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_procedures
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: procedure-service
    ports:
      - "3006:3006"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  procurement-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: procurement-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3013
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_procurement
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: procurement-service
    ports:
      - "3013:3013"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3013/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web-portal:
    <<: *service-defaults
    build:
      context: .
      dockerfile: frontend/web-portal/Dockerfile
    environment:
      <<: *jwt-env
      NODE_ENV: development
      # next start forces NODE_ENV=production in the image; dev runs on plain
      # http (LAN/localhost) so Secure cookies must be disabled explicitly.
      COOKIE_SECURE: "false"
      PORT: 3010
      # Server-side vars for next.config.js rewrites (resolved inside Docker network)
      IDENTITY_SERVICE_URL: http://identity-service:3000/api/v1
      PATIENT_SERVICE_URL: http://patient-service:3002/api/v1
      APPOINTMENT_SERVICE_URL: http://appointment-service:3001/api/v1
      DOCTOR_SERVICE_URL: http://doctor-service:3003/api/v1
      BILLING_SERVICE_URL: http://billing-service:3004/api/v1
      EHR_SERVICE_URL: http://ehr-service:3005/api/v1
      PROCEDURE_SERVICE_URL: http://procedure-service:3006/api/v1
      NOTIFICATION_SERVICE_URL: http://notification-service:3007/api/v1
      ANALYTICS_SERVICE_URL: http://analytics-service:3009/api/v1
      CHATBOT_SERVICE_URL: http://ai-chatbot-service:3008/api/v1
      FILE_SERVICE_URL: http://file-service:3011/api/v1
      INTEGRATION_SERVICE_URL: http://integration-service:3012/api/v1
      PROCUREMENT_SERVICE_URL: http://procurement-service:3013/api/v1
    ports:
      - "3010:3010"
    depends_on:
      - identity-service
      - patient-service
      - appointment-service
      - doctor-service
      - billing-service
      - ehr-service
      - procedure-service
      - procurement-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  integration-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/Dockerfile.backend
      args:
        SERVICE_DIR: integration-service
    environment:
      <<: *jwt-env
      NODE_ENV: development
      PORT: 3012
      DATABASE_URL: postgresql://fadl_app:fadl_app_dev_secret@pgbouncer:5432/fadl_integrations
      DATABASE_POOL_MIN: 2
      DATABASE_POOL_MAX: 10
      LOG_LEVEL: info
      BRANCH_ID: 1
      SERVICE_NAME: integration-service
      APPOINTMENT_SERVICE_URL: http://appointment-service:3001/api/v1
      BILLING_SERVICE_URL: http://billing-service:3004/api/v1
      PATIENT_SERVICE_URL: http://patient-service:3002/api/v1
      VIZITA_WEBHOOK_SECRET: ${VIZITA_WEBHOOK_SECRET:-}
      EKSHF_WEBHOOK_SECRET: ${EKSHF_WEBHOOK_SECRET:-}
      CLINIDO_WEBHOOK_SECRET: ${CLINIDO_WEBHOOK_SECRET:-}
      INSTAPAY_WEBHOOK_SECRET: ${INSTAPAY_WEBHOOK_SECRET:-}
    ports:
      - "3012:3012"
    depends_on:
      pgbouncer:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3012/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

# ─── NETWORKS & VOLUMES ───────────────────────────────────────────────────────

networks:
  fadl-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  pgbackups:
