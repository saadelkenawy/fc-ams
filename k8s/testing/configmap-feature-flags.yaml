apiVersion: v1
kind: ConfigMap
metadata:
  name: feature-flags
  namespace: fadl-testing
  labels:
    app.kubernetes.io/part-of: fadl-clinic
data:
  # Default subscription tier for new tenants in the testing environment.
  # Valid values: basic | standard | premium
  DEFAULT_TIER: "standard"

  # Comma-separated list of module IDs that are force-enabled regardless of tier.
  # Leave empty to rely solely on tier-based resolution.
  FORCE_ENABLED_MODULES: ""

  # Set to "true" to allow developer JWT tokens to override the subscription tier.
  ALLOW_DEVELOPER_TOKEN_OVERRIDE: "true"
