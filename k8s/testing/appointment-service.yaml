apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: fadl-testing
  labels:
    app: appointment-service
    app.kubernetes.io/part-of: fadl-clinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: fadl/appointment-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fadl-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fadl-secrets
                  key: appointment-db-url
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-service:3003"
            - name: BILLING_SERVICE_URL
              value: "http://billing-service:3004"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: fadl-secrets
                  key: redis-url
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: fadl-testing
spec:
  selector:
    app: appointment-service
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: appointment-service
  namespace: fadl-testing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: appointment-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
