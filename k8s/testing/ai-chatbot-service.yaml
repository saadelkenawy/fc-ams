apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-chatbot-service
  namespace: fadl-testing
  labels:
    app: ai-chatbot-service
    app.kubernetes.io/part-of: fadl-clinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-chatbot-service
  template:
    metadata:
      labels:
        app: ai-chatbot-service
    spec:
      containers:
        - name: ai-chatbot-service
          image: fadl/ai-chatbot-service:latest
          ports:
            - containerPort: 3008
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3008"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fadl-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fadl-secrets
                  key: ai-chatbot-db-url
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fadl-secrets
                  key: openrouter-api-key
            - name: PATIENT_SERVICE_URL
              value: "http://patient-service:3002"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:3001"
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-service:3003"
          readinessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-chatbot-service
  namespace: fadl-testing
spec:
  selector:
    app: ai-chatbot-service
  ports:
    - port: 3008
      targetPort: 3008
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-chatbot-service
  namespace: fadl-testing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-chatbot-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
