version: '3.9'

# SonarQube overlay — opt-in, not part of the default dev stack.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.sonar.yml up -d sonarqube
#
# Prerequisites on the host (run once):
#   sudo sysctl -w vm.max_map_count=524288
#   sudo sysctl -w fs.file-max=131072
# Persist in /etc/sysctl.d/99-sonarqube.conf to survive reboots.
#
# The fadl_sonar database must exist before starting — run:
#   psql -h localhost -p 5432 -U postgres -v sonar_password=<pw> -f infra/sonarqube/create-db.sql

services:
  sonarqube:
    image: sonarqube:lts-community
    container_name: fcms-sonarqube
    depends_on:
      - postgres
    environment:
      # SonarQube connects directly to Postgres (not PgBouncer) because
      # PgBouncer's transaction-pooling mode is incompatible with SonarQube's
      # prepared-statement usage.
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/fadl_sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    networks:
      - fadl-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
